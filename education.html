<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ✅ FIXED Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>EDUCATION - Donation System</title>
</head>

<body class="bg-gray-50 font-inter">

<div class="max-w-7xl mx-auto bg-white shadow mt-10">

<header class="bg-[#701382] text-white text-center p-2 relative">

    <!-- Back -->
    <div class="absolute top-4 left-6">
        <a href="categories.html" class="text-xl font-semibold hover:underline">
            Go Back
        </a>
    </div>

    <h1 class="font-bold text-6xl md:text-5xl mt-12 mb-16">
        DonateToCare
    </h1>

    <div class="mb-6">
        <a href="donor-dashboard.html" class="text-2xl font-medium hover:underline mt-10">
            Go to Dashboard
        </a>
    </div>

</header>

</div>

<main>

<div class="min-h-[70vh] space-y-20 max-w-4xl mx-auto mt-10">

    <!-- Option 1 -->
    <div class="flex items-center justify-between gap-10">
        <p class="text-3xl font-normal text-black">
            1. Sponsor the education of a child.
        </p>

        <button 
        onclick="goToPayment('student-sp-payment.html')" 
        class="bg-[#701382] text-white px-6 py-2 hover:bg-purple-800 transition cursor-pointer">
        Donate now
        </button>
    </div>

    <!-- Option 2 -->
    <div class="flex items-center justify-between gap-10">
        <p class="text-3xl font-normal text-black">
            2. Sponsor for setting up a library at a school.
        </p>

        <button 
        onclick="goToPayment('student-sp-payment.html')" 
        class="bg-[#701382] text-white px-6 py-2 hover:bg-purple-800 transition cursor-pointer">
        Donate now
        </button>
    </div>

</div>

</main>

<footer class="bg-[#701382] text-white text-center py-4 mb-10 max-w-7xl mx-auto">
    <p class="font-medium">
        Copyright DonateToCare 2026. All rights reserved.
    </p>
</footer>

<!-- ✅ SCRIPT -->
<script>
function goToPayment(page) {
    window.location.href = page;
}
</script>

</body>
</html>
