<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<title>Donation Receipt - Donation System</title>
</head>

<body class="bg-gray-50 font-inter">

<div class="max-w-7xl mx-auto bg-white shadow mt-10">

<header class="bg-[#701382] text-white text-center p-10">
    <h1 class="font-bold text-6xl mt-12 mb-16">DonateToCare</h1>
</header>

</div>

<main>
<div class="min-h-[60vh]">

<h2 class="text-4xl font-semibold text-center mt-6 mb-10">
    Make a Donation
</h2>

<div class="max-w-3xl mx-auto space-y-6 text-xl">

    <!-- Donation ID -->
    <div>
        <h3>Donation ID: <span id="donationId"></span></h3>
    </div>

    <!-- NAME -->
    <div>
        <label>Name</label>
        <input id="name" type="text" class="w-full border p-3">
    </div>

    <!-- EMAIL -->
    <div>
        <label>Email</label>
        <input id="email" type="email" class="w-full border p-3">
    </div>

    <!-- CATEGORY -->
    <div>
        <label>Donated For</label>
        <input id="category" type="text" placeholder="education / animal / welfare" class="w-full border p-3">
    </div>

    <!-- AMOUNT -->
    <div>
        <label>Amount (BDT)</label>
        <input id="amount" type="number" class="w-full border p-3">
    </div>

    <!-- PAYMENT -->
    <div>
        <label>Payment Method</label>
        <select id="payment" class="w-full border p-3">
            <option value="bkash">Bkash</option>
            <option value="nagad">Nagad</option>
        </select>
    </div>

    <!-- BUTTON -->
    <div class="text-center">
 <a href="donation-lib-receipt.html">
        <button onclick="makeDonation()" 
        class="bg-[#701382] text-white px-8 py-3 rounded">
            Donate Now
        </button>
                       
                </a>
    </div>

</div>
</div>
</main>

<footer class="bg-[#701382] text-white text-center py-4 mt-10 max-w-7xl mx-auto">
    <p>Copyright DonateToCare 2026</p>
</footer>

<script>
const BASE_URL = "http://localhost/Donation-System/backend/api/";


document.addEventListener("DOMContentLoaded", () => {

    document.getElementById("donationId").innerText = 
        localStorage.getItem("donation_id") || "N/A";

    document.getElementById("name").value = 
        localStorage.getItem("user_name") || "";

    document.getElementById("email").value = 
        localStorage.getItem("user_email") || "";
});


async function makeDonation() {

    const user_id = localStorage.getItem("user_id");

    if(!user_id){
        alert("Login first!");
        window.location.href = "login.html";
        return;
    }

    const data = {
        user_id: user_id,
        category: document.getElementById("category").value,
        amount: document.getElementById("amount").value,
        payment_method: document.getElementById("payment").value
    };

    try {
        const res = await fetch(BASE_URL + "donate.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if(result.message){
            alert("Donation successful!");

            localStorage.setItem("donation_id", result.donation_id);

            // Reload page to show new ID
            location.reload();

        } else {
            alert(result.error);
        }

    } catch(err){
        alert("Server error");
        console.error(err);
    }
}
</script>

</body>
</html>
