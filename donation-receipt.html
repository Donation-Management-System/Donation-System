<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<title>Donation Receipt - Donation System</title>
    <script src="config.js"></script>
</head>

<body class="bg-gray-50 font-inter">

<div class="max-w-7xl mx-auto bg-white shadow mt-10">
<header class="bg-[#701382] text-white text-center p-10">
    <h1 class="font-bold text-6xl mt-12 mb-16">DonateToCare</h1>
</header>
</div>

<main>
<div class="min-h-[60vh]">

<h2 class="text-4xl font-semibold text-center mt-6 mb-10">Make a Donation</h2>

<div class="max-w-3xl mx-auto space-y-6 text-xl">

    <div>
        <h3>Donation ID: <span id="donationId"></span></h3>
    </div>

    <div>
        <label>Name</label>
        <input id="name" type="text" class="w-full border p-3">
    </div>

    <div>
        <label>Email</label>
        <input id="email" type="email" class="w-full border p-3">
    </div>

    <div>
        <label>Donated For</label>
        <input id="category" type="text" class="w-full border p-3">
    </div>

    <div>
        <label>Amount (BDT)</label>
        <input id="amount" type="number" class="w-full border p-3">
    </div>

    <div>
        <label>Payment Method</label>
        <select id="payment" class="w-full border p-3">
            <option value="bkash">Bkash</option>
            <option value="nagad">Nagad</option>
        </select>
    </div>

    <div>
        <label>Comment (Optional)</label>
        <textarea id="comment" class="w-full border p-3"></textarea>
    </div>

    <div class="text-center">
        <button onclick="makeDonation()"
        class="bg-green-600 text-white px-8 py-3 rounded hover:bg-green-700">
            Pay Now
        </button>
    </div>

</div>
</div>
</main>

<footer class="bg-[#701382] text-white text-center py-4 mt-10 max-w-7xl mx-auto">
    <p>Copyright DonateToCare 2026</p>
</footer>

<script>
// ✅ FIXED: was localhost
// BASE_URL loaded from config.js

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("donationId").innerText =
        localStorage.getItem("donation_id") || "N/A";
    document.getElementById("name").value =
        localStorage.getItem("user_name") || "";
    document.getElementById("email").value =
        localStorage.getItem("user_email") || "";
});

async function makeDonation() {
    const user_id = localStorage.getItem("user_id");

    if(!user_id){
        alert("Login first!");
        window.location.href = "donor.html";
        return;
    }

    const name     = document.getElementById("name").value;
    const email    = document.getElementById("email").value;
    const category = document.getElementById("category").value;
    const amount   = document.getElementById("amount").value;
    const payment  = document.getElementById("payment").value;
    const comment  = document.getElementById("comment").value;

    if(!name || !email || !category || !amount){
        alert("Please fill all required fields!");
        return;
    }

    const data = { user_id, name, email, category, amount, payment_method: payment, comment };

    try {
        const res = await fetch(BASE_URL + "donate.php", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if(result.message){
            const donation_id = result.donation_id;
            localStorage.setItem("donation_id", donation_id);

            // ✅ FIXED: ssl_payment.php URL also uses live BASE_URL
            window.location.href =
                BASE_URL + "ssl_payment.php?donation_id=" + donation_id +
                "&amount=" + amount +
                "&name=" + encodeURIComponent(name) +
                "&email=" + encodeURIComponent(email);
        } else {
            alert(result.error || "Donation failed");
        }

    } catch(err){
        alert("Server error");
        console.error(err);
    }
}
</script>

</body>
</html>
