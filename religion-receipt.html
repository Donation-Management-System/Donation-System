<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Student Donation Receipt - Donation System</title>
    <link rel="stylesheet" href="tailwind.css">
</head>
<body class=" bg-gray-50 font-inter ">
    <div class="max-w-7xl mx-auto  bg-white shadow mt-10">

    <header class="bg-[#701382] text-white text-center p-10 relative ">

      
        

        <h1 class="font-bold text-6xl md:text-5xl mt-12 mb-16 ">DonateToCare</h1>

        
        
        

    </header>

    </div>

    <main>

    <div class="min-h-[60vh]">

        <h2 class="text-4xl font-semibold text-center mt-6 mb-20">Donation receipt</h2>
        
        <div class="max-w-6xl mx-auto grid grid-cols-2 gap-y-6 text-3xl">
                 
            <div class="font-medium">Name:</div>
            <div class="font-normal text-[#000000]">Username</div>

            <div class="font-medium">Email:</div>
            <div class="font-normal text-[#000000]">User_emai</div>

            <div class="font-medium">Donated for:</div>
            <div class="font-normal text-[#000000]">Giving Zakat</div>

            <div class="font-medium">Amount:</div>
            <div class="font-normal text-[#000000]">BDT 20000 <span>(received with thanks)</span></div>


        </div>
      


    </div>

    <div class="max-w-5xl mx-auto mt-10 mb-20 flex flex-col md:flex-row items-center justify-between gap-6">
            <p class="text-xl font-medium text-gray-700">
                Please visit your dashboard for tracking how your donation is being utilized
            </p>
            <a href="donor-dashboard.html">
              <button class="bg-[#701382] text-white px-10 py-3 text-xl font-semibold hover:bg-purple-900 transition cursor-pointer"> Confirm 
            </button>
            </a>
        </div>

</main>


<footer class="bg-[#701382] text-white text-center py-4 mb-10 max-w-7xl mx-auto ">

    <p class="font-medium">Copyright DonateToCare 2026. All rights reserved.</p>
</footer>
    
</body>
</html>
