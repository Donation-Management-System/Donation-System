<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<title>Donor Login - Donation System</title>
</head>

<body class="bg-gray-50 font-inter">

<div class="max-w-7xl mx-auto bg-white shadow mt-10">

<header class="bg-[#701382] text-white text-center p-10 relative">
    <div class="absolute top-4 left-6">
        <a href="index.html" class="text-xl font-semibold hover:underline">Go Back</a>
    </div>

    <h1 class="font-bold text-6xl mt-12 mb-16">DonateToCare</h1>
</header>

</div>

<main>
<div class="min-h-[80vh]">

<h2 class="text-[#701382] font-semibold text-4xl text-center mt-5">
    Donor Login
</h2>

<div class="max-w-2xl mx-auto space-y-6">

    <div class="font-medium text-2xl mt-10">
        <label>Email</label>
        <input id="email" type="email" class="w-full border border-black p-3">
    </div>

    <div class="font-medium text-2xl">
        <label>Password</label>
        <input id="password" type="password" class="w-full border border-black p-3">
    </div>

    <div class="text-center mt-6">
        <button onclick="loginUser()" class="bg-[#701382] text-white px-6 py-3 rounded">
            Login
        </button>
    </div>

</div>
</div>
</main>

<footer class="bg-[#701382] text-white text-center py-4 mt-10 max-w-7xl mx-auto">
    <p>Copyright DonateToCare 2026</p>
</footer>

<script>
// ✅ FIXED: Correct live server URL (no trailing slash issues)
const BASE_URL = "https://donation-system.great-site.net/backend/api/";

async function loginUser() {

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!email || !password){
        alert("Please fill all fields!");
        return;
    }

    const data = { email, password };

    try {
        const res = await fetch(BASE_URL + "login.php", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        // ✅ FIXED: login.php returns status:"success" and message (not result.error)
        if(result.status === "success"){

            localStorage.setItem("user_id", result.user_id);
            localStorage.setItem("user_name", result.name);
            localStorage.setItem("role", result.role);

            alert("Login successful! Welcome " + result.name);

            if(result.role === "admin"){
                window.location.href = "admin-dashboard.html";
            } else {
                window.location.href = "categories.html";
            }

        } else {
            // ✅ FIXED: login.php sends error in "message" key
            alert(result.message || "Login failed");
        }

    } catch(err){
        alert("Server error. Please try again.");
        console.error(err);
    }
}
</script>

</body>
</html>
