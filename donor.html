<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Donor Login - Donation System</title>
    <link rel="stylesheet" href="tailwind.css">
</head>
<body class=" bg-gray-50 font-inter ">
    <div class="max-w-7xl mx-auto  bg-white shadow mt-10">

    <header class="bg-[#701382] text-white text-center p-10 relative ">

        <div class="absolute top-4 left-6">
      <a href="index.html" class="text-xl font-semibold hover:underline">Go Back</a>

        </div>

        <h1 class="font-bold text-6xl md:text-5xl mt-12 mb-16 ">DonateToCare</h1>
        
        

    </header>

    </div>

    <main>

   <div class="min-h-[80vh]">

<h2 class="text-[#701382] font-semibold text-4xl text-center mt-5">
    Donor Login
</h2>

<div class="max-w-2xl mx-auto space-y-6">

   
    <div class="font-medium text-2xl mt-10">
        <label>Email</label>
        <input id="email" type="email" class="w-full border border-black p-3">
    </div>


    <div class="font-medium text-2xl">
        <label>Password</label>
        <input id="password" type="password" class="w-full border border-black p-3">
    </div>

   
    <div class="text-center mt-6">
        <button onclick="loginUser()" class="bg-[#701382] text-white px-6 py-3 rounded">
            Login
        </button>
    </div>

</div>
</div>

</main>


<footer class="bg-[#701382] text-white text-center py-4 mb-10 max-w-7xl mx-auto ">

    <p class="font-medium">Copyright DonateToCare 2026. All rights reserved.</p>
</footer>
    
</body>
</html>
