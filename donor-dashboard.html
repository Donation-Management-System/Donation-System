<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<title>Donor Dashboard</title>
    <script src="config.js"></script>
</head>

<body class="bg-gray-50">

<div class="max-w-7xl mx-auto bg-white shadow mt-10">
<header class="bg-[#701382] text-white text-center p-2 relative">

<div class="absolute top-4 left-6">
<a href="#" onclick="logout()" class="text-xl hover:underline">Logout</a>
</div>

<h1 class="font-bold text-6xl mt-12 mb-16">DonateToCare</h1>

<div class="mb-6">
<a href="categories.html" class="text-2xl hover:underline">Go to homepage</a>
</div>

</header>
</div>

<main>
<div class="min-h-[70vh]">

<h2 id="welcome" class="text-4xl font-bold mb-10 mt-10 ml-10">Welcome</h2>

<h3 class="text-3xl ml-10">Your Donations:</h3>

<div id="donationsList" class="space-y-6 ml-10 mt-6"></div>

</div>
</main>

<footer class="bg-[#701382] text-white text-center py-4 mt-10 max-w-7xl mx-auto">
    <p>Copyright DonateToCare 2026</p>
</footer>

<button onclick="goBack()"
class="fixed bottom-5 left-5 bg-[#701382] text-white px-5 py-2 rounded shadow hover:bg-purple-900 transition">
    ← Back
</button>

<script>
// ✅ FIXED: was localhost
// BASE_URL loaded from config.js

document.addEventListener("DOMContentLoaded", async () => {
    const user_id = localStorage.getItem("user_id");

    if(!user_id){
        alert("Login first");
        window.location.href = "donor.html";
        return;
    }

    try {
        const res = await fetch(BASE_URL + "get_user_donations.php?user_id=" + user_id);
        const data = await res.json();

        if(data.error){
            alert(data.error);
            return;
        }

        document.getElementById("welcome").innerText =
            "Welcome, " + (data[0]?.name || "User");

        let html = "";

        if(data.length === 0 || data[0].id === null){
            html = "<p class='text-gray-500 text-xl'>No donations yet.</p>";
        } else {
            data.forEach((d, index) => {
                html += `
                <div class="flex items-center gap-10 text-xl">
                    <p>${index+1}. ${d.category} - BDT ${d.amount}</p>
                    <button onclick="track(${d.id})"
                    class="bg-[#701382] text-white px-6 py-2">
                        Track
                    </button>
                </div>`;
            });
        }

        document.getElementById("donationsList").innerHTML = html;

    } catch(err){
        console.error(err);
        alert("Error loading dashboard");
    }
});

function track(id){
    localStorage.setItem("donation_id", id);
    window.location.href = "tracking.html";
}

function logout(){
    localStorage.clear();
    window.location.href = "donor.html";
}

function goBack(){
    window.history.back();
}
</script>

</body>
</html>
