<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Tracking - Donation System</title>
</head>

<body class="bg-gray-50 font-inter">

<div class="max-w-7xl mx-auto bg-white shadow mt-10">
<header class="bg-[#701382] text-white text-center p-10 relative">

    <div class="flex justify-center gap-4 mb-4">
        <input id="donation_id" placeholder="Enter Donation ID"
        class="border text-black p-2 rounded w-60">
        <button onclick="trackDonation()"
        class="bg-white text-[#701382] font-semibold px-4 py-2 rounded">
            Track
        </button>
    </div>

    <div id="result" class="text-white text-lg"></div>

    <h1 class="font-bold text-6xl md:text-5xl mt-12 mb-16">DonateToCare</h1>
</header>
</div>

<main>
<div class="min-h-[70vh]">

    <p class="text-4xl font-light mt-10 ml-31">
        BDT 20000 has been transferred to name_of_student by us successfully,
        and the student has used it for buying books.
    </p>

    <h3 class="text-2xl font-medium mt-10 ml-31">Pictures of evidences</h3>

    <div class="flex gap-25 mb-16 mt-10 ml-31">
        <div class="w-58 h-38 bg-[#D9D9D9]"></div>
        <div class="w-58 h-38 bg-[#D9D9D9]"></div>
        <div class="w-58 h-38 bg-[#D9D9D9]"></div>
    </div>

    <div class="flex justify-center">
        <a href="donor-dashboard.html">
            <button class="bg-[#701382] text-white px-10 py-3 text-xl font-medium cursor-pointer hover:bg-purple-900 transition">
                Go back to dashboard
            </button>
        </a>
    </div>

</div>
</main>

<footer class="bg-[#701382] text-white text-center py-4 mb-10 max-w-7xl mx-auto">
    <p class="font-medium">Copyright DonateToCare 2026. All rights reserved.</p>
</footer>

<script>
// ✅ FIXED: was localhost — moved to top of script block
const BASE_URL = "https://donation-system.great-site.net/backend/api/";

// Auto-load if coming from dashboard with saved donation_id
document.addEventListener("DOMContentLoaded", () => {
    const saved_id = localStorage.getItem("donation_id");
    if(saved_id){
        document.getElementById("donation_id").value = saved_id;
        trackDonation();
    }
});

async function trackDonation() {
    const id = document.getElementById("donation_id").value;

    if(!id){ alert("Please enter a Donation ID"); return; }

    try {
        const res = await fetch(BASE_URL + "tracking.php?donation_id=" + id);
        const data = await res.json();

        if(!data || data.length === 0){
            document.getElementById("result").innerHTML =
                "<p>No tracking info found for ID: " + id + "</p>";
            return;
        }

        let html = "";
        data.forEach(t => {
            html += `<p>📦 ${t.status} — ${t.updated_at}</p>`;
        });

        document.getElementById("result").innerHTML = html;

    } catch(e){
        console.error(e);
        document.getElementById("result").innerHTML = "<p>Error fetching tracking info</p>";
    }
}
</script>

</body>
</html>
