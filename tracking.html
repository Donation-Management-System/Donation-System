<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Tracking - Donation System</title>
    <script src="config.js"></script>
</head>
<body class="bg-gray-50 font-inter">

<div class="max-w-7xl mx-auto bg-white shadow mt-10">
<header class="bg-[#701382] text-white text-center p-10 relative">
    <div class="flex justify-center gap-4 mb-4">
        <input id="donation_id" placeholder="Enter Donation ID"
        class="border text-black p-2 rounded w-60">
        <button onclick="trackDonation()"
        class="bg-white text-[#701382] font-semibold px-4 py-2 rounded">
            Track
        </button>
    </div>
    <div id="result" class="text-white text-lg"></div>
    <h1 class="font-bold text-6xl md:text-5xl mt-12 mb-16">DonateToCare</h1>
</header>
</div>

<main>
<div class="min-h-[70vh] max-w-7xl mx-auto px-10">

    <!-- Details / Note from Admin -->
    <div id="detailsSection" class="mt-10 hidden">
        <h3 class="text-2xl font-medium mb-3">Details</h3>
        <p id="detailsText" class="text-gray-700 text-lg leading-relaxed bg-white border border-gray-200 rounded-xl p-5 shadow-sm"></p>
    </div>

    <p class="text-4xl font-light mt-10">
       Your Donations will be donated soon....
    </p>

    <!-- Evidence Images from Admin -->
    <h3 class="text-2xl font-medium mt-10 mb-4">Pictures of evidences</h3>

    <!-- Loading state -->
    <div id="imagesLoading" class="flex gap-6 mb-16 mt-4">
        <div class="w-58 h-38 bg-[#D9D9D9] animate-pulse rounded"></div>
        <div class="w-58 h-38 bg-[#D9D9D9] animate-pulse rounded"></div>
        <div class="w-58 h-38 bg-[#D9D9D9] animate-pulse rounded"></div>
    </div>

    <!-- Actual images (hidden until loaded) -->
    <div id="evidenceImages" class="flex flex-wrap gap-6 mb-16 mt-4 hidden"></div>

    <!-- No images fallback -->
    <p id="noImagesMsg" class="text-gray-400 mb-16 hidden">No evidence images uploaded yet.</p>

    <div class="flex justify-center mb-10">
        <a href="donor-dashboard.html">
            <button class="bg-[#701382] text-white px-10 py-3 text-xl font-medium cursor-pointer hover:bg-purple-900 transition">
                Go back to dashboard
            </button>
        </a>
    </div>
</div>
</main>

<footer class="bg-[#701382] text-white text-center py-4 mb-10 max-w-7xl mx-auto">
    <p class="font-medium">Copyright DonateToCare 2026. All rights reserved.</p>
</footer>

<script>
// BASE_URL loaded from config.js
// UPLOADS_URL loaded from config.js

// ── Auto-track if donation_id saved from dashboard ────
document.addEventListener("DOMContentLoaded", () => {
    const saved_id = localStorage.getItem("donation_id");
    if(saved_id){
        document.getElementById("donation_id").value = saved_id;
        trackDonation();
    }

    // Load admin-controlled content for tracking page
    loadTrackingNote();
    loadTrackingImages();
});

// ── Tracking status ───────────────────────────────────
async function trackDonation() {
    const id = document.getElementById("donation_id").value.trim();
    if(!id){ alert("Please enter a Donation ID"); return; }
    try {
        const res  = await fetch(BASE_URL + "tracking.php?donation_id=" + id);
        const data = await res.json();
        if(!data || data.length === 0){
            document.getElementById("result").innerHTML =
                "<p>No tracking info found for ID: " + id + "</p>";
            return;
        }
        let html = "";
        data.forEach(t => {
            html += `<p>📦 ${t.status} — ${t.updated_at}</p>`;
        });
        document.getElementById("result").innerHTML = html;
    } catch(e){
        console.error(e);
        document.getElementById("result").innerHTML = "<p>Error fetching tracking info</p>";
    }
}

// ── Load admin note for tracking page ─────────────────
function loadTrackingNote(){
    fetch(BASE_URL + "get_note.php?category=tracking")
    .then(res => res.json())
    .then(data => {
        const note = (data.note || "").trim();
        const section = document.getElementById("detailsSection");
        const textEl  = document.getElementById("detailsText");
        if(note){
            textEl.textContent = note;
            section.classList.remove("hidden");
        } else {
            section.classList.add("hidden");
        }
    })
    .catch(e => console.error("Note load error:", e));
}

// ── Load admin images for tracking page ───────────────
function loadTrackingImages(){
    fetch(BASE_URL + "get_images.php?category=tracking")
    .then(res => res.json())
    .then(data => {
        const loadingEl  = document.getElementById("imagesLoading");
        const imagesEl   = document.getElementById("evidenceImages");
        const noImagesEl = document.getElementById("noImagesMsg");

        loadingEl.classList.add("hidden");

        if(!data || data.length === 0){
            noImagesEl.classList.remove("hidden");
            return;
        }

        let html = "";
        data.forEach(img => {
            html += `
            <div class="border border-gray-200 rounded-lg overflow-hidden shadow-sm">
                <img src="${UPLOADS_URL}${img.image}"
                     class="w-58 h-38 object-cover"
                     alt="Evidence image"
                     onerror="this.parentElement.style.display='none'">
            </div>`;
        });

        imagesEl.innerHTML = html;
        imagesEl.classList.remove("hidden");
    })
    .catch(e => {
        console.error("Images load error:", e);
        document.getElementById("imagesLoading").classList.add("hidden");
        document.getElementById("noImagesMsg").classList.remove("hidden");
    });
}
</script>

</body>
</html>
