<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Categories - Donation System</title>
    <link rel="stylesheet" href="tailwind.css">
</head>
<body class=" bg-gray-50 font-inter ">
    <div class="max-w-7xl mx-auto  bg-white shadow mt-10">

    <header class="bg-[#701382] text-white text-center p-2 relative ">

       

        <h1 class="font-bold text-6xl md:text-5xl mt-12 mb-16 ">DonateToCare</h1>

        <div class="mb-6">
                <a href="donor-dashboard.html" class="text-2xl font-medium hover:underline mt-10">Go to dashboard</a>
            </div>
        
        

    </header>

    </div>

    <main>

    <div class="min-h-[70vh] p-10">

        <h2 class=" text-[#701382] font-semibold text-4xl text-center mt-5 "  >Which  area would you like to make a difference in?</h2>

        <!-- Categories -->
    <div class="grid grid-cols-2 gap-12 max-w-2xl mx-auto mt-10 ">
        <!-- Education -->
        <div class="border-2 border-[#701382] p-10 text-center ">

            <h3 class="font-semibold text-4xl text-[#701382] mb-6 mt-10">EDUCATION</h3>

            <a href="education.html">

            <button class="bg-[#701382] text-white px-6 py-2 hover:bg-purple-800 transition cursor-pointer">Donate now</button>
            </a>
        </div>

       <!-- Religious -->
 
        <div class="border border-[#701382] p-10 text-center">

            <h3 class="font-semibold text-4xl text-[#701382] mb-6">RELIGIOUS ORGANIZATION</h3>
         <a href="religion.html">
            <button class="bg-[#701382] text-white px-6 py-2 hover:bg-purple-800 cursor-pointer">Donate now</button>
            </a>
        </div>

        <!-- Human Welfare -->

      
        <div class="border border-[#701382] p-10 text-center">

            <h3 class="font-semibold text-4xl text-[#701382] mb-6">HUMAN WELFARE</h3>

            <a href="humanWelfare.html" >

            <button class="bg-[#701382] text-white px-6 py-2 hover:bg-purple-800 cursor-pointer">Donate now</button>
            </a>
        </div>

        <!-- Animal Welfare -->

        
        <div class="border border-[#701382] p-10 text-center">

            <h3 class="font-semibold text-4xl text-[#701382] mb-6">ANIMAL WELFARE</h3>

            <a href="animal.html">

            <button class="bg-[#701382] text-white px-6 py-2 hover:bg-purple-800 cursor-pointer">Donate now</button>
            </a>
        </div>
    
    </div>

    </div>

</main>


<footer class="bg-[#701382] text-white text-center py-4 mb-10 max-w-7xl mx-auto ">

    <p class="font-medium">Copyright DonateToCare 2026. All rights reserved.</p>
</footer>
    
</body>
</html>
