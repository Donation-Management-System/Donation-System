<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Student Sponsor Payment - Donation System</title>
</head>

<body class="bg-gray-50 font-inter">

<div class="max-w-7xl mx-auto bg-white shadow mt-10">

<header class="bg-[#701382] text-white text-center p-10 relative">

    <div class="absolute top-4 left-6">
        <a href="education.html" class="text-xl font-semibold hover:underline">
            Go Back
        </a>
    </div>

    <h1 class="font-bold text-6xl md:text-5xl mt-12 mb-16">
        DonateToCare
    </h1>

    <div class="mb-6">
        <a href="donor-dashboard.html" class="text-2xl font-medium hover:underline">
            Go to dashboard
        </a>
    </div>

</header>

</div>

<main>

<div class="min-h-[60vh] max-w-5xl mx-auto p-10">

    <p class="text-4xl font-light mt-10">
        Sponsor the education of name_of_student
    </p>

    <h3 class="text-2xl font-light mt-10">Details</h3>

    <h3 class="text-2xl font-light mt-20">Pictures of evidences</h3>

    <!-- ✅ DYNAMIC IMAGE SECTION -->
    <div id="imageContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-10">

        <!-- Default placeholder (if no image loaded yet) -->
        <div class="w-full h-40 bg-gray-300 animate-pulse rounded"></div>
        <div class="w-full h-40 bg-gray-300 animate-pulse rounded"></div>
        <div class="w-full h-40 bg-gray-300 animate-pulse rounded"></div>

    </div>

    <div class="mt-20 text-center">
        <button 
        onclick="goToReceipt('donation-receipt.html')" 
        class="bg-[#701382] text-white px-10 py-3 text-2xl font-medium cursor-pointer hover:bg-purple-900 transition shadow-md rounded-lg">
            Donate now
        </button>
    </div>

</div>

</main>

<footer class="bg-[#701382] text-white text-center py-4 mb-10 max-w-7xl mx-auto">
    <p class="font-medium">
        Copyright DonateToCare 2026. All rights reserved.
    </p>
</footer>

<script>

function goToReceipt(page) {
    window.location.href = page;
}

// ✅ LOAD IMAGES FROM BACKEND (ADMIN CONTROLLED)
fetch("https://donation-system.great-site.net/backend/api/get_images.php?category=student")
.then(res => res.json())
.then(data => {

    const container = document.getElementById("imageContainer");

    if(data.length > 0){

        container.innerHTML = "";

        data.slice(0,3).forEach(img => {

            container.innerHTML += `
                <div class="overflow-hidden rounded-xl shadow-md hover:shadow-xl transition">
                    
                    <img 
                        src="https://donation-system.great-site.net/backend/uploads/${img.image}" 
                        class="w-full h-40 object-cover hover:scale-105 transition duration-500"
                    >

                </div>
            `;
        });

    } else {
        // যদি DB তে image না থাকে
        container.innerHTML = `
            <p class="col-span-3 text-center text-gray-500 text-lg">
                No images available
            </p>
        `;
    }

})
.catch(err => {
    console.error("Image load error:", err);
});

</script>

</body>
</html>
